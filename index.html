<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Plant Catalog</title>

    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1000px;
            margin: auto;
            padding: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            font-size: 18px;
        }

        .plant {
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-top: 15px;
            padding: 15px;
        }

        img {
            max-width: 250px;
            border-radius: 8px;
        }

        .latin {
            font-style: italic;
        }
    </style>
</head>
<body>

<h1>🌳 Plant Catalog</h1>

<input id="search" placeholder="Search...">

<div id="plants"></div>

<script>
let allPlants = [];

async function loadPlants() {
    const response = await fetch("plants.yaml");
    const text = await response.text();

    allPlants = jsyaml.load(text);

    render(allPlants);
}

function render(plants) {
    const container = document.getElementById("plants");

    container.innerHTML = "";

    for (const plant of plants) {
        const div = document.createElement("div");

        div.className = "plant";

        const latin = plant.names.la[0];

        const hungarian =
            plant.names.hu.length > 0
                ? plant.names.hu[0]
                : "";

        const image =
            plant.images.length > 0
                ? plant.images[0]
                : "";

        div.innerHTML = `
            <h2>${latin}</h2>
            <div class="latin">${hungarian}</div>
            ${image ? `<img src="${image}">` : ""}
        `;

        container.appendChild(div);
    }
}

document.getElementById("search").addEventListener("input", e => {
    const q = e.target.value.toLowerCase();

    const filtered = allPlants.filter(p => {
        const la = p.names.la.join(" ").toLowerCase();
        const hu = p.names.hu.join(" ").toLowerCase();

        return la.includes(q) || hu.includes(q);
    });

    render(filtered);
});

loadPlants();
</script>

</body>
</html>
