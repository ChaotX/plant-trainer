<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Növényfelismerő</title>

    <link rel="stylesheet" href="style.css">

    <script src="vendor/js-yaml.min.js"></script>

    <!-- <script src="js/storage.js"></script> -->
    <!-- <script src="js/statistics.js"></script> -->
    <!-- <script src="js/study-mode.js"></script> -->
    <!-- <script src="js/quiz-multiple-choice.js"></script> -->
    <!-- <script src="js/quiz-free-text.js"></script> -->

    <script src="app.js"></script>
</head>

<body>

<header>
    <h1 id="appTitle">
        🌿 Növényfelismerő
    </h1>
</header>

<main>

    <!-- --------------------------------------------------- -->
    <!-- STARTUP -->
    <!-- --------------------------------------------------- -->

    <section id="startupScreen">

        <h2>
            Adatforrás kiválasztása
        </h2>

        <p>
            Válassz egy növény adatbázist.
        </p>

        <select id="sourceSelector">
            <option>
                Betöltés...
            </option>
        </select>

        <br><br>

        <button id="loadSourceButton">
            Betöltés
        </button>

        <div id="loadStatus"></div>

    </section>

    <!-- --------------------------------------------------- -->
    <!-- MAIN MENU -->
    <!-- --------------------------------------------------- -->

    <section
        id="mainMenu"
        class="hidden"
    >

        <h2>
            Menü
        </h2>

        <div class="menu-buttons">

            <button
                id="studyModeButton"
            >
                📚 Tanuló mód
            </button>

            <button
                id="multipleChoiceButton"
            >
                ✅ Feleletválasztós kvíz
            </button>

            <button
                id="freeTextButton"
            >
                ✏️ Beírásos kvíz
            </button>

            <button
                id="statsButton"
            >
                📈 Statisztika
            </button>

        </div>

        <hr>

        <button
            id="changeSourceButton"
        >
            🔄 Adatforrás váltása
        </button>

    </section>

    <!-- --------------------------------------------------- -->
    <!-- CONTENT -->
    <!-- --------------------------------------------------- -->

    <section id="content">

    </section>

</main>

</body>
</html>
